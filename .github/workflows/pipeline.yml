name: train-api-pipeline

on:
  push:
    paths:
      - "**"
      - ".github/workflows/pipeline.yml"
  pull_request:
    paths:
      - "**"
      - ".github/workflows/pipeline.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}/train-api:${{ github.sha }}
      IMAGE_LATEST: ghcr.io/${{ github.repository }}/train-api:latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run train.py
        run: |
          python train.py

      - name: Run tests
        run: PYTHONPATH=. python -m pytest -q

      - name: Smoke test API
        run: |
          uvicorn app:app --host 127.0.0.1 --port 8000 &
          UVICORN_PID=$!
          trap 'if [ -n "${UVICORN_PID:-}" ] && kill -0 "$UVICORN_PID" 2>/dev/null; then kill "$UVICORN_PID"; fi' EXIT

          READY=0
          for i in {1..20}; do
            if curl -sf http://127.0.0.1:8000/health >/dev/null; then
              READY=1
              break
            fi
            sleep 1
          done

          test "${READY:-0}" = "1"

          curl -sf http://127.0.0.1:8000/health | grep -q '"status":"ok"'
          curl -sf http://127.0.0.1:8000/metrics | grep -q "iris_requests_total"

          curl -sf -X POST "http://127.0.0.1:8000/predict" \
            -H "Content-Type: application/json" \
            -d '{"features":[5.1,3.5,1.4,0.2]}' | grep -q "prediction"

          INVALID_BODY="$(mktemp)"
          INVALID_CODE="$(curl -s -o "$INVALID_BODY" -w "%{http_code}" -X POST "http://127.0.0.1:8000/predict" \
            -H "Content-Type: application/json" \
            -d '{"features":[5.1,3.5,1.4]}')"
          test "$INVALID_CODE" = "422"
          grep -q "expected 4 features" "$INVALID_BODY"

      - name: Docker build
        run: |
          docker build -t train-api:${{ github.sha }} -t $IMAGE_NAME .
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            docker tag train-api:${{ github.sha }} $IMAGE_LATEST
          fi

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: train-api:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: CRITICAL

      - name: Smoke test container
        run: |
          docker run -d --rm --name train-api-ci -p 8001:8000 train-api:${{ github.sha }}
          trap 'docker ps --format "{{.Names}}" | grep -q "^train-api-ci$" && docker stop train-api-ci >/dev/null || true' EXIT

          READY=0
          for i in {1..20}; do
            if curl -sf http://127.0.0.1:8001/health >/dev/null; then
              READY=1
              break
            fi
            sleep 1
          done

          if [ "${READY:-0}" != "1" ]; then
            docker ps -a
            docker logs train-api-ci || true
            exit 1
          fi

          test "${READY:-0}" = "1"

          HEALTH_BODY="$(curl -sf http://127.0.0.1:8001/health)"
          echo "container /health => $HEALTH_BODY"
          echo "$HEALTH_BODY" | grep -q '"status":"ok"'

          METRICS_BODY="$(curl -sf http://127.0.0.1:8001/metrics)"
          echo "$METRICS_BODY" | grep -q "iris_requests_total"

          PREDICT_BODY="$(curl -sf -X POST "http://127.0.0.1:8001/predict" \
            -H "Content-Type: application/json" \
            -d '{"features":[5.1,3.5,1.4,0.2]}')"
          echo "container /predict(valid) => $PREDICT_BODY"
          echo "$PREDICT_BODY" | grep -q "prediction"
          INVALID_BODY="$(mktemp)"
          INVALID_CODE="$(curl -s -o "$INVALID_BODY" -w "%{http_code}" -X POST "http://127.0.0.1:8001/predict" \
            -H "Content-Type: application/json" \
            -d '{"features":[5.1,3.5,1.4]}')"
          test "$INVALID_CODE" = "422"
          grep -q "expected 4 features" "$INVALID_BODY"

      - name: Login to GHCR
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Docker push
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: |
          docker push $IMAGE_NAME
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            docker push $IMAGE_LATEST
          fi
